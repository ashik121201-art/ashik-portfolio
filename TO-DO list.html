<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF"-8">
        <meta name="viewport"
        conent="width=device-width,initial-scale=1.0">
        <title>To-Do List</title>
        <style>
         *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:Arial,sans-serif;
         }
         body{
            min-height:100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,#667eea,#764ba2);
         }
         .container{
            width: 90%;
            max-width: 450px;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
         }
         h1{
            text-align: center;
            margin-bottom: 20px;
         }
         .input-box{
            display: flex;
            gap:10px;
         }
         input{
            flex:1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
         }
         button{
            padding: 12px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
         }
         button:hover{
            background:#5563d6;
         }
         ul{
            margin-top: 20px;
            list-style: none;
         }
         li{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
         }
         .completed{
            text-decoration: line-through;
            color: gray;
         }
         .delete{
            background: red;
            padding: 6px 10px;
         }
        </style>
        
    </head>
    <body>
        <div class="container">
            <h1> To-Do List</h1>
            <div class="input-box">
                <input type="text" id="taskInput" placeholder="Enter task...">
                <button onclick="addtask()">Add</button>
            </div>
            <ul id="taskList"></ul>
        </div>
        <script>
            function addtask() {
                let input = 
                document.getElementById("taskInput");
                let task = input.value.trim();

                if(task === ""){
                    alert("please enter a task");
                    return;
                }
                let li = document.createElement("li");

                li.innerHTML =`
                <span 
                onclick="this.classList.toogle('completed')">${task}</span>
                <button class="delete"
                onclick="this.parentElement.remove()">Delete</button>
                `;
                document.getElementById("taskList").appendChild(li);
                input.value = "";
            }
        </script>
    </body>
</html>
